site_name: PresentationSpec
site_description: A Go-first specification library for data-driven presentations
site_url: https://grokify.github.io/presentation-spec/
repo_url: https://github.com/grokify/presentation-spec
repo_name: grokify/presentation-spec

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - CLI Reference: getting-started/cli.md
  - Specification:
    - Overview: specification/overview.md
    - Presentation: specification/presentation.md
    - Slides: specification/slides.md
    - Widgets: specification/widgets.md
    - Layouts: specification/layouts.md
    - Themes: specification/themes.md
    - Data Sources: specification/datasources.md
  - Guides:
    - Creating Dashboards: guides/dashboards.md
    - Using Data Sources: guides/datasources.md
    - Custom Themes: guides/themes.md
    - Speaker Notes: guides/speaker-notes.md
  - Examples:
    - Basic Presentation: examples/basic.md
    - Executive Dashboard: examples/dashboard.md
  - Reference:
    - Roadmap: specs/ROADMAP.md
  - Releases:
    - v0.1.0: releases/v0.1.0.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/grokify/presentation-spec
  version:
    provider: mike

copyright: Copyright &copy; 2025 PresentationSpec Contributors
